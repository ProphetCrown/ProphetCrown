<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>THRIFTED: Reset Password</title>
	<link rel="stylesheet" href="css/resetpassword-layout.css">
	<link rel="stylesheet" href="css/general-styling.css">
</head>
<body>
	<header>
		<div class="upper-logo">
			<a href="homepage.html"><img src="img/thrifted-logo.jpg" alt="Website Logo"></a>
		</div>
		
		<div class="upper-header">
			<div class="searchbar">
				<input type="text" placeholder="Search...">
			</div>
			
			<div class="button-icon">
				<a href="login.html"><img src="img/account-icon.jpg" alt="Account Icon"></a>
				<a href="team.html"><img src="img/team-icon.jpg" alt="Team Icon"></a>
			</div>
			
			<div class="aboutus">
				<p><a href="aboutus.html"><strong>ABOUT US</strong></a></p>
			</div>
		</div>
	
		<nav class="navigation-bar">
			<ul class="navigation-links">
				<li><a href="homepage.html">Home</a></li>
                <li class="dropdown"><a href="#" class="dropbtn">Categories</a>
					<div class="categories-dropdown">
						<a href="womenclothing.html">Women's Clothing</a>
						<a href="menclothing.html">Men's Clothing</a>
						<a href="kidsclothing.html">Kid's Clothing</a>
					</div>
				</li>
                <li><a href="shoppingcart.html">Shopping Cart</a></li>
				<li><a href="contact.html">Contact</a></li>
			</ul>
		</nav>
	</header>
	<main>
		<div class="resetpassword-header">
			<h1><strong>Reset Password</strong></h1>
		</div>
			
		<div class="resetpassword-data">
			<img src="img/secure-icon.jpg" alt="Secure Icon">
			<p>Your Data is Protected</p>
		</div>
		
		<section class="reset-password-section">
			<form action="login.html" method="post">
				<div class="form-group">
					<label for="new-password">Create New Password:</label>
					<input type="password" id="new-password" name="new-password" pattern="[a-zA-Z0-9_-]+" minlength="14" title="Password must only contain alphanumeric characters" required>
				</div>
				<br>
				<div class="form-group">
					<label for="confirm-password">Password:</label>
					<input type="password" id="confirm-password" name="confirm-password" pattern="[a-zA-Z0-9_-]+" minlength="14" title="Password must only contain alphanumeric characters" required>
				</div>
				<br>
				<div class="form-button">
					<button type="submit">CONTINUE</button>
				</div>
			</form>
		</section>
	</main>
</body>
</html>
