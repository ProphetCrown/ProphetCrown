<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THRIFTED: Shopping Cart</title>
	<link rel="stylesheet" href="css/shoppingcart-layout.css">
	<link rel="stylesheet" href="css/general-styling.css">
</head>
<body>
    <header>
		<div class="upper-logo">
			<a href="homepage.html"><img src="img/thrifted-logo.jpg" alt="Website Logo"></a>
		</div>
		
		<div class="upper-header">
			<div class="searchbar">
				<input type="text" placeholder="Search...">
			</div>
			
			<div class="button-icon">
				<a href="login.html"><img src="img/account-icon.jpg" alt="Account Icon"></a>
				<a href="team.html"><img src="img/team-icon.jpg" alt="Team Icon"></a>
			</div>
			
			<div class="aboutus">
				<p><a href="aboutus.html"><strong>ABOUT US</strong></a></p>
			</div>
		</div>
	
		<nav class="navigation-bar">
			<ul class="navigation-links">
				<li><a href="homepage.html">Home</a></li>
                <li class="dropdown"><a href="#" class="dropbtn">Categories</a>
					<div class="categories-dropdown">
						<a href="womenclothing.html">Women's Clothing</a>
						<a href="menclothing.html">Men's Clothing</a>
						<a href="kidsclothing.html">Kid's Clothing</a>
					</div>
				</li>
                <li><a href="shoppingcart.html">Shopping Cart</a></li>
				<li><a href="contact.html">Contact</a></li>
			</ul>
		</nav>
	</header>
	<main class="main-page">
		<div class="secure-checkout">
			<img src="img/secure-icon.jpg" alt="Secure Icon">
			<span>SECURE CHECKOUT</span>
		</div>
		
		<div class="empty-cart">
			<img src="img/cart-icon.jpg" alt="Empty Cart">
			<p><strong>YOUR SHOPPING CART IS EMPTY</strong></p>
		</div>
	</main>
	<footer>
		<div class="voucher">
			<img src="img/voucher-icon.jpg" alt="Voucher Icon">
			<span><strong>VOUCHERS</strong></span>
		</div>
		
		<div class="checkout-section">
			<div class="select-all">
				<input type="checkbox" id="select-all">
				<label for="select-all"><strong>ALL</strong></label>
			</div>
			
			<div class="total">
				<span><strong>TOTAL: PHP 0</strong></span>
				<a href="#"><button type="button">CHECKOUT</button></a>
			</div>
		</div>
	</footer>
</body>
</html>
