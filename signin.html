<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THRIFTED: Sign In</title>
    <link rel="stylesheet" href="css/signin-layout.css">
	<link rel="stylesheet" href="css/general-styling.css">
</head>
<body>
	<header>
		<div class="upper-logo">
			<a href="homepage.html"><img src="img/thrifted-logo.jpg" alt="Website Logo"></a>
		</div>
		
		<div class="upper-header">
			<div class="searchbar">
				<input type="text" placeholder="Search...">
			</div>
			
			<div class="button-icon">
				<a href="login.html"><img src="img/account-icon.jpg" alt="Account Icon"></a>
				<a href="team.html"><img src="img/team-icon.jpg" alt="Team Icon"></a>
			</div>
			
			<div class="aboutus">
				<p><a href="aboutus.html"><strong>ABOUT US</strong></a></p>
			</div>
		</div>
	
		<nav class="navigation-bar">
			<ul class="navigation-links">
				<li><a href="homepage.html">Home</a></li>
                <li class="dropdown"><a href="#" class="dropbtn">Categories</a>
					<div class="categories-dropdown">
						<a href="womenclothing.html">Women's Clothing</a>
						<a href="menclothing.html">Men's Clothing</a>
						<a href="kidsclothing.html">Kid's Clothing</a>
					</div>
				</li>
                <li><a href="shoppingcart.html">Shopping Cart</a></li>
				<li><a href="contact.html">Contact</a></li>
			</ul>
		</nav>
	</header>
	<main>
		<div class="signin-header">
			<h1><strong>Sign In</strong></h1>
			<div class="signin-data">
				<img src="img/secure-icon.jpg" alt="Secure Icon">
				<p>Your Data is Protected</p>
			</div>
		</div>
		
		<section class="signin-section">
			<div class="signin-container">
				<form action="homepage.html" method="post">
					<label for="name">Name:</label>
					<input type="text" id="name" name="name" required>
					<br><br>
					<label>Email Address:</label>
					<input type="email" name="email" required>
					<br><br>
					<label>Password:</label>
					<input type="password" id="password" name="password" pattern="[a-zA-Z0-9_-]+" minlength="14" title="Password must only contain alphanumeric characters" required>
					<br><br>
					<button type="submit" class="signin-btn">SIGN IN</button>
				</form>

				<p class="login-link">
					Have an account?
					<a href="login.html">Log In</a>
				</p>
			</div>
		</section>
	</main>
</body>
</html>
