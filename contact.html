<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>THRIFTED: Contact</title>
	<link rel="stylesheet" href="css/contact-layout.css">
	<link rel="stylesheet" href="css/general-styling.css">
</head>
<body>
	<header>
		<div class="upper-logo">
			<a href="homepage.html"><img src="img/thrifted-logo.jpg" alt="Website Logo"></a>
		</div>
		
		<div class="upper-header">
			<div class="searchbar">
				<input type="text" placeholder="Search...">
			</div>
			
			<div class="button-icon">
				<a href="login.html"><img src="img/account-icon.jpg" alt="Account Icon"></a>
				<a href="team.html"><img src="img/team-icon.jpg" alt="Team Icon"></a>
			</div>
			
			<div class="aboutus">
				<p><a href="aboutus.html"><strong>ABOUT US</strong></a></p>
			</div>
		</div>
	
		<nav class="navigation-bar">
			<ul class="navigation-links">
				<li><a href="homepage.html">Home</a></li>
                <li class="dropdown"><a href="#" class="dropbtn">Categories</a>
					<div class="categories-dropdown">
						<a href="womenclothing.html">Women's Clothing</a>
						<a href="menclothing.html">Men's Clothing</a>
						<a href="kidsclothing.html">Kid's Clothing</a>
					</div>
				</li>
                <li><a href="shoppingcart.html">Shopping Cart</a></li>
				<li><a href="contact.html">Contact</a></li>
			</ul>
		</nav>
	</header>
	<main>
		<div class="text-rectangle">
			<h1><strong>DO YOU HAVE ANY CONCERN?</strong></h1>
		</div>
		
		<form action="contact-thankyou.html" method="post">
			<section class="personal-information">
				<h2>Personal Information</h2>
				<div class="upper-row">
					<div class="first-name">
						<label for="first-name">First Name:</label>
						<input type="text" id="first-name" name="first-name" required>
					</div>
					
					<div class="last-name">
						<label for="last-name">Last Name:</label>
						<input type="text" id="last-name" name="last-name" required>
					</div>
				</div>
				<br>
				<div class="lower-row">
					<div class="email">
						<label for="email">Email Address:</label>
						<input type="email" id="email" name="email" required>
					</div>
					
					<div class="phone-number">
						<label for="phone-number">Phone Number <em>(optional)</em>:</label>
						<input type="tel" id="phone-number" name="phone-number" pattern="[0-9]{11}" maxlength="11">
					</div>
				</div>
			</section>
			
			<section class="form">
				<h2>Form</h2>
				<label for="concern-choices">How can we help you today?</label>
                <select id="concern-choices" name="concern-choices" required>
                    <option value="">Select an Option</option>
                    <option value="orders-shipping">Orders and Shipping</option>
                    <option value="returns-refunds">Returns and Refunds</option>
					<option value="payments">Payments</option>
                    <option value="deals-vouchers">Deals and Vouchers</option>
					<option value="policies">Policies</option>
					<option value="general">General</option>
                </select>
				<br>
				<label for="message-box">Message:</label><br>
				<textarea id="message-box" name="message-box" rows="10" cols="55"></textarea>
				
				<div class="form-buttons">
					<input type="submit" value="Submit">
					<input type="reset" value="Clear">
				</div>
			</section>
		</form>
	</main>
</body>
</html>
